<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGORA — TALL NIVÅ 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee&family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../styles.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="game-body">
    <div class="canopy" aria-hidden="true"></div>

    <header class="game-header">
        <a href="../../../index.html" class="back-button" aria-label="Tilbake til forsiden">
            <span aria-hidden="true">←</span>
            <span class="back-button__text">TILBAKE</span>
        </a>
        <h1 class="game-title">TALL · NIVÅ 1</h1>
        <div class="score" aria-live="polite">
            <span class="score__icon" aria-hidden="true">⭐</span>
            <span class="score__value" id="score">0</span>
            <span class="score__total" id="score-total">/10</span>
        </div>
    </header>

    <main class="game-main">
        <agora-bridge id="bridge"></agora-bridge>

        <p class="prompt">TRYKK PÅ RIKTIG TALL</p>

        <button
            type="button"
            class="replay-button"
            id="replay-button"
            aria-label="Hør tallet igjen"
        >
            <span class="replay-button__icon" aria-hidden="true">🔊</span>
            <span class="replay-button__text">HØR IGJEN</span>
        </button>

        <label class="voice-picker" id="voice-picker" hidden>
            <span class="voice-picker__label">STEMME</span>
            <select
                class="voice-picker__select"
                id="voice-select"
                aria-label="Velg stemme"
            ></select>
        </label>

        <div
            class="number-grid"
            id="number-grid"
            role="group"
            aria-label="Velg tall"
        ></div>

        <p class="feedback" id="feedback" aria-live="polite"></p>

        <p
            class="voice-warning"
            id="voice-warning"
            hidden
        >
            🌱 Ingen norsk stemme funnet på denne enheten. Installer en norsk
            (bokmål) TTS-stemme i systeminnstillingene for best opplevelse.
        </p>
    </main>

    <div class="victory" id="victory" hidden role="dialog" aria-modal="true" aria-labelledby="victory-title">
        <div class="victory__card">
            <div class="victory__star" aria-hidden="true">⭐</div>
            <h2 id="victory-title">DU KLARTE DET!</h2>
            <p>Pandaen kom seg trygt over brua! 🐼🌳</p>
            <div class="victory__buttons">
                <button type="button" class="victory__btn victory__btn--retry" id="retry-btn">
                    <span aria-hidden="true">🔄</span>
                    SPILL IGJEN
                </button>
                <a href="../level-2/index.html" class="victory__btn victory__btn--next" id="next-btn">
                    <span aria-hidden="true">➡️</span>
                    NESTE SPILL
                </a>
            </div>
        </div>
    </div>

    <script src="../../../progress.js" defer></script>
    <script src="../../../shared/bridge/bridge.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
