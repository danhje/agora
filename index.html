<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="canopy" aria-hidden="true"></div>

    <header class="site-header">
        <h1 class="logo">
            <span class="logo-leaf" aria-hidden="true">🌿</span>
            AGORA
        </h1>
    </header>

    <main class="categories">
        <!-- Reading -->
        <section class="category category--reading">
            <header class="category__header">
                <span class="category__icon" aria-hidden="true">📖</span>
                <h2 class="category__title">LESING</h2>
            </header>
            <ul class="game-list">
                <li>
                    <a href="games/reading/level-1/index.html" class="game-card">
                        <span class="game-card__label">NIVÅ</span>
                        <span class="game-card__number">1</span>
                    </a>
                </li>
                <li>
                    <a href="games/reading/level-2/index.html" class="game-card">
                        <span class="game-card__label">NIVÅ</span>
                        <span class="game-card__number">2</span>
                    </a>
                </li>
            </ul>
        </section>

        <!-- Numbers -->
        <section class="category category--numbers">
            <header class="category__header">
                <span class="category__icon" aria-hidden="true">🔢</span>
                <h2 class="category__title">TALL</h2>
            </header>
            <ul class="game-list"></ul>
        </section>

        <!-- Telling time -->
        <section class="category category--time">
            <header class="category__header">
                <span class="category__icon" aria-hidden="true">⏰</span>
                <h2 class="category__title">KLOKKA</h2>
            </header>
            <ul class="game-list"></ul>
        </section>
    </main>
</body>
</html>
